<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики - Игра</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: system-ui, sans-serif;
            flex-direction: column;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background-color: #333;
            padding: 5px;
            border-radius: 10px;
        }
        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.1s;
        }
        .cell:hover {
            background-color: #e0e0e0;
        }
        .status {
            margin-top: 20px;
            font-size: 1.5rem;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="board" id="board"></div>
    <div class="status" id="status">Загрузка...</div>
    <button id="resetButton">Новая игра</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        const role = urlParams.get('role');
        const token = urlParams.get('token');

        if (!room || !role || !token) {
            alert('Неверные параметры игры');
            window.location.href = '/';
        }

        let boardState = Array(9).fill('');
        let currentTurn = 'X';
        let winner = null;
        let tie = false;
        let gameActive = true;
        let pollingInterval = null;

        const boardDiv = document.getElementById('board');
        const statusDiv = document.getElementById('status');

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.dataset.index = i;
            cell.addEventListener('click', () => makeMove(i));
            boardDiv.appendChild(cell);
        }
        const cells = document.querySelectorAll('.cell');

        function updateBoardUI() {
            cells.forEach((cell, idx) => {
                cell.textContent = boardState[idx];
            });

            if (winner) {
                const winnerText = (winner === role) ? 'Вы победили!' : 'Противник победил!';
                statusDiv.innerHTML = winnerText;
                gameActive = false;
                boardDiv.classList.add('disabled');
                if (pollingInterval) clearInterval(pollingInterval);
            } else if (tie) {
                statusDiv.innerText = 'Ничья!';
                gameActive = false;
                boardDiv.classList.add('disabled');
                if (pollingInterval) clearInterval(pollingInterval);
            } else {
                statusDiv.innerText = (currentTurn === role) ? 'Ваш ход' : 'Ход соперника...';
                if (currentTurn === role && !winner && !tie) {
                    boardDiv.classList.remove('disabled');
                } else {
                    boardDiv.classList.add('disabled');
                }
            }
        }

        async function makeMove(index) {
            if (!gameActive || winner || tie) return;
            if (currentTurn !== role) {
                alert('Сейчас не ваш ход');
                return;
            }
            if (boardState[index] !== '') {
                alert('Клетка уже занята');
                return;
            }

            try {
                const response = await fetch('/make_move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room, index, role, token })
                });
                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    //ход успешно отправлен, ждём обновления состояния от polling
                }
            } catch (err) {
                alert('Ошибка отправки хода');
                console.error(err);
            }
        }

        async function fetchGameState() {
            try {
                const response = await fetch(`/game_state/${room}`);
                if (response.status === 404) {
                    alert('Игра завершена или соперник покинул её');
                    window.location.href = '/';
                    return;
                }
                const data = await response.json();
                boardState = data.board;
                currentTurn = data.turn;
                winner = data.winner;
                tie = data.tie;
                updateBoardUI();
            } catch (err) {
                console.error('Ошибка получения состояния игры', err);
            }
        }

        pollingInterval = setInterval(fetchGameState, 800);
        fetchGameState();

        document.getElementById('resetButton').addEventListener('click', async () => {
            try {
                await fetch('/leave_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room, token })
                });
            } catch (err) {}
            if (pollingInterval) clearInterval(pollingInterval);
            window.location.href = '/';
        });
    </script>
</body>
</html>
