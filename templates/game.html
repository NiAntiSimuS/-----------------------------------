<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Крестики-нолики</title>

		<style>
			body {
				margin: 0;
				padding: 0;

				min-height: 100vh;

				display: flex;
				justify-content: center;
				align-items: center;
				flex-direction: column;

				background: #f2f2f2;

				font-family: Arial, sans-serif;
			}

			.board {
				display: grid;

				grid-template-columns: repeat(3, 120px);
				grid-template-rows: repeat(3, 120px);

				gap: 5px;
			}

			.cell {
				background: white;

				display: flex;
				justify-content: center;
				align-items: center;

				font-size: 64px;
				font-weight: bold;

				cursor: pointer;

				border-radius: 10px;
			}

			.status {
				margin-top: 20px;

				font-size: 28px;
			}
		</style>
	</head>
	<body>
		<div class="board" id="board"></div>

		<div class="status" id="status">Подключение...</div>

		<script>
			const params = new URLSearchParams(window.location.search)

			const role = params.get('role')
			const token = params.get('token')

			const port = window.location.port

			const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:'

			const ws = new WebSocket(
				`${protocol}//${window.location.hostname}:${port}/ws/${role}`,
			)

			let board = Array(9).fill('')

			let turn = 'X'

			let winner = null

			const boardDiv = document.getElementById('board')

			const statusDiv = document.getElementById('status')

			for (let i = 0; i < 9; i++) {
				const cell = document.createElement('div')

				cell.className = 'cell'

				cell.dataset.index = i

				cell.onclick = () => makeMove(i)

				boardDiv.appendChild(cell)
			}

			const cells = document.querySelectorAll('.cell')

			ws.onopen = () => {
				ws.send(
					JSON.stringify({
						token: token,
					}),
				)
			}

			ws.onmessage = event => {
				const data = JSON.parse(event.data)

				if (data.board) {
					board = data.board

					turn = data.turn

					winner = data.winner

					render()
				}
			}

			function render() {
				for (let i = 0; i < 9; i++) {
					cells[i].innerText = board[i]
				}

				if (winner) {
					if (winner === role) {
						statusDiv.innerText = 'Вы победили!'
					} else {
						statusDiv.innerText = 'Вы проиграли!'
					}

					return
				}

				if (turn === role) {
					statusDiv.innerText = 'Ваш ход'
				} else {
					statusDiv.innerText = 'Ход соперника'
				}
			}

			function makeMove(index) {
				if (winner) return

				if (turn !== role) return

				if (board[index] !== '') return

				ws.send(
					JSON.stringify({
						type: 'move',
						index: index,
					}),
				)
			}
		</script>
	</body>
</html>
