<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики - Поиск игры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            flex-direction: column;
        }
        .big-button {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #e53935;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease;
        }
        .big-button:active {
            transform: scale(0.96);
        }
        @media (max-width: 600px) {
            .big-button {
                width: 200px;
                height: 200px;
                font-size: 1.5rem;
            }
        }
        .status {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #333;
        }
        .error {
            color: #e53935;
        }
    </style>
</head>
<body>
    <button class="big-button" id="mainButton">НАЖМИ</button>
    <div class="status" id="status">Нажмите кнопку, чтобы найти игру</div>

    <script>
        const button = document.getElementById('mainButton');
        const statusDiv = document.getElementById('status');
        let currentToken = null;
        let pollingInterval = null;

        button.addEventListener('click', async () => {
            if (currentToken) {
                statusDiv.innerHTML = 'Вы уже в очереди или игре. Обновите страницу.';
                return;
            }

            try {
                const response = await fetch('/find_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                if (data.status === 'ready') {
                    // Сразу переходим в игру
                    window.location.href = `/game?room=${data.room}&role=${data.role}&token=${data.token}`;
                } else if (data.status === 'waiting') {
                    currentToken = data.token;
                    statusDiv.innerHTML = 'Поиск соперника...';
                    // Начинаем опрашивать /check_queue
                    pollingInterval = setInterval(async () => {
                        try {
                            const resp = await fetch('/check_queue', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ token: currentToken })
                            });
                            const checkData = await resp.json();
                            if (checkData.status === 'ready') {
                                clearInterval(pollingInterval);
                                window.location.href = `/game?room=${checkData.room}&role=${checkData.role}&token=${checkData.token}`;
                            } else if (checkData.status === 'error') {
                                clearInterval(pollingInterval);
                                statusDiv.innerHTML = `<span class="error">${checkData.message}</span>`;
                                currentToken = null;
                            }
                        } catch (err) {
                            console.error(err);
                        }
                    }, 2000); // каждые 2 секунды
                } else {
                    statusDiv.innerHTML = `<span class="error">Неизвестный ответ сервера</span>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<span class="error">Ошибка подключения к серверу</span>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
