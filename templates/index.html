<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крестики-нолики – поиск</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            flex-direction: column;
        }
        .big-button {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: #e53935;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }
        .big-button:active { transform: scale(0.96); }
        @media (max-width: 600px) {
            .big-button { width: 200px; height: 200px; font-size: 1.5rem; }
        }
        .status { margin-top: 20px; font-size: 1.2rem; color: #333; }
        .error { color: #e53935; }
    </style>
</head>
<body>
    <button class="big-button" id="mainButton">НАЖМИ</button>
    <div class="status" id="status">Нажмите кнопку, чтобы найти игру</div>

    <script>
        let ws = null;

        document.getElementById('mainButton').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                return;
            }
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Поиск соперника...';

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'match_found') {
                    // Переходим на игровой сервер
                    const gameUrl = `http://${window.location.hostname}:${data.port}/game?role=${data.role}&token=${data.token}`;
                    window.location.href = gameUrl;
                }
            };
            ws.onerror = () => {
                statusDiv.innerHTML = '<span class="error">Ошибка соединения с сервером</span>';
            };
            ws.onclose = () => {
                if (statusDiv.innerHTML !== 'Поиск соперника...') return;
                statusDiv.innerHTML = '<span class="error">Соединение потеряно. Обновите страницу.</span>';
            };
        });
    </script>
</body>
</html>
